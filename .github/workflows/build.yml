name: Build VSIX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run build

      - run: npx @vscode/vsce package --no-dependencies --allow-missing-repository -o workforest.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: workforest-vsix
          path: workforest.vsix
